<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="theme-color" content="#0b0e14" />
  <link rel="manifest" href="manifest.webmanifest" />
  <title>Gaze Reader — Feasibility Spike</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <!-- Front camera feed. Hidden by default; debug mode shows a small preview. -->
  <video id="cam" playsinline autoplay muted></video>

  <!-- The right-to-left word stream -->
  <div id="stage">
    <div id="focus-zone"></div>
    <div id="stream"></div>
    <div id="gaze-marker"></div>
  </div>

  <!-- Controls -->
  <div id="controls">
    <button id="btn-start">Start camera</button>
    <button id="btn-calibrate" disabled>Calibrate</button>
    <button id="btn-run" disabled>Run</button>
    <button id="btn-debug">Debug</button>
  </div>

  <!-- Calibration prompt overlay -->
  <div id="calib-overlay" class="hidden">
    <div id="calib-target"></div>
    <div id="calib-text">Look at the dot</div>
  </div>

  <!-- Live debug overlay -->
  <pre id="debug" class="hidden"></pre>

  <div id="status">Tap "Start camera" to begin. Requires HTTPS + front camera.</div>

  <script type="module" src="app.js"></script>
</body>
</html>
